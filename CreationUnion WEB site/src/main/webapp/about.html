<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="about.title">About robinsoft</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/i18n.js" defer></script>
  <script src="js/include.js" defer></script>
</head>
<body>
  <div data-include="partials/header.html"></div>

  <main class="container">
    <h2 data-i18n="about.heading">About us</h2>
    <p data-i18n="about.p">robinsoft is a development team focused on multimedia and cloud services. Our goal is to deliver stable, simple and powerful applications to users.</p>
    <p data-i18n="about.contactLine"><strong>Contact:</strong> <em>robinsoft.test01@gmail.com</em></p>
  </main>

  <footer>
    <div class="container">&copy; <span data-i18n="footer.year">2026</span> <span data-i18n="brand">robinsoft</span></div>
  </footer>
  <script>
    // Initialize language selector after the shared header has been loaded
    document.addEventListener('includesLoaded', function(){
      const sel = document.getElementById('langSelect');
      if(!sel) return;
      const cur = window.i18n && window.i18n.currentLang ? window.i18n.currentLang : 'en';
      sel.value = cur;
      sel.addEventListener('change', function(){
        const v = sel.value;
        window.i18n && window.i18n.setLang && window.i18n.setLang(v);
      });
    });
  </script>
</body>
</html>
