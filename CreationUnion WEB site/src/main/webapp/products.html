<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="products.title">Products - robinsoft</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/i18n.js" defer></script>
</head>
<body>
  <header>
    <div class="container">
      <h1 class="brand" data-i18n="brand">robinsoft</h1>
      <nav class="main-nav">
        <a href="index.html" data-i18n="nav.home">Home</a>
        <a href="products.html" data-i18n="nav.products">Products</a>
        <a href="about.html" data-i18n="nav.about">About</a>
        <!-- Language selector -->
        <select id="langSelect" aria-label="Language selector" style="margin-left:1rem">
          <option value="en">English</option>
          <option value="zh_CN">简体中文</option>
          <option value="zh_TW">繁體中文</option>
          <option value="fr">Français</option>
        </select>
      </nav>
    </div>
  </header>

  <main class="container">
    <h2 data-i18n="products.heading">Our products</h2>
    <div class="product-list">
      <article class="product-card">
        <h3 data-i18n="product.cmp.title">CloudMediaPlayer</h3>
        <p data-i18n="product.cmp.p">CloudMediaPlayer is a cloud-based media player and manager that supports streaming, playlist management and cross-device sync.</p>
        <p data-i18n="product.status">Status: Released</p>
      </article>

      <article class="product-card placeholder">
        <h3 data-i18n="products.more">More products</h3>
        <p data-i18n="products.more.p">We are working on more products, stay tuned.</p>
      </article>
    </div>
  </main>

  <footer>
    <div class="container">&copy; <span data-i18n="footer.year">2026</span> <span data-i18n="brand">robinsoft</span></div>
  </footer>
</body>
</html>
