<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="products.title">Products - robinsoft</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/i18n.js" defer></script>
  <script src="js/include.js" defer></script>
</head>
<body>
  <div data-include="partials/header.html"></div>

  <main class="container">
    <h2 data-i18n="products.heading">Our products</h2>
    <div class="product-list">
      <article class="product-card cmp-card">
        <div class="cmp-header">
          <img class="cmp-logo" src="images/cloudmediaplayer-logo.png" alt="CloudMediaPlayer logo">
          <a class="cmp-title-link" href="./products/cloudmediaplayer/cmp_index.html" aria-label="Open CloudMediaPlayer details">
            <h3 data-i18n="product.cmp.title">CloudMediaPlayer</h3>
          </a>
        </div>
        <p data-i18n="product.cmp.p">CloudMediaPlayer is a cloud-based media player and manager that supports streaming, playlist management and cross-device sync.</p>
        <p data-i18n="product.status">Status: Released</p>
        <p><a class="cmp-action-link" href="./products/cloudmediaplayer/cmp_index.html">View details</a></p>
      </article>

      <article class="product-card placeholder">
        <h3 data-i18n="products.more">More products</h3>
        <p data-i18n="products.more.p">We are working on more products, stay tuned.</p>
      </article>
    </div>
  </main>

  <footer>
    <div class="container">&copy; <span data-i18n="footer.year">2026</span> <span data-i18n="brand">robinsoft</span></div>
  </footer>
  <script>
    // Initialize language selector after the shared header has been loaded
    document.addEventListener('includesLoaded', function(){
      const sel = document.getElementById('langSelect');
      if(!sel) return;
      const cur = window.i18n && window.i18n.currentLang ? window.i18n.currentLang : 'en';
      sel.value = cur;
      sel.addEventListener('change', function(){
        const v = sel.value;
        window.i18n && window.i18n.setLang && window.i18n.setLang(v);
      });
    });
  </script>
</body>
</html>
