name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"] # 确保这里对应你的分支名
  workflow_dispatch: # 添加这一行，手动触发按钮就会出现
  
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 关键点：这里填写你网页所在的物理路径
          path: 'CreationUnion WEB site/src/main/webapp' 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
